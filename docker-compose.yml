version: "3.9"
services:
  server:
    build: ./server
    container_name: server
    ports:
      - "3000:3000"

  client:
    build: ./client
    container_name: client
    ports:
      - "5173:5173"
    depends_on:
      - proxy

  proxy:
    image: nginx:stable-alpine
    container_name: proxy
    ports:
      - "8080:8080"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server